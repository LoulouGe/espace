<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Lander 🚀</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <canvas id="game"></canvas>

  <!-- HUD (visible en jeu) -->
  <div id="hud" class="hidden">
    <div id="hud-left">
      <div class="hrow"><span class="hlbl">ALT</span><span id="v-alt" class="hval">0 m</span></div>
      <div class="hrow"><span class="hlbl">VIT ↓</span><span id="v-vs" class="hval safe">0.0</span><span class="hunit">
          m/s</span></div>
      <div class="hrow"><span class="hlbl">VIT →</span><span id="v-hs" class="hval safe">0.0</span><span class="hunit">
          m/s</span></div>
      <div class="hrow"><span class="hlbl">INCL</span><span id="v-ang" class="hval safe">0.0</span><span
          class="hunit">°</span></div>
    </div>
    <div id="hud-center">
      <div id="hud-planet-name"></div>
      <div id="hud-timer">00:00</div>
      <div id="training-badge" class="hidden">✦ ENTRAÎNEMENT ✦</div>
      <div id="landing-arrow" class="hidden">▼ PAD</div>
    </div>
    <div id="hud-right">
      <div class="hrow"><span class="hlbl">CARBURANT</span></div>
      <div id="fuel-wrap">
        <div id="fuel-bar"></div><span id="v-fuel">100%</span>
      </div>
      <div class="hrow" id="wind-row"><span class="hlbl">VENT</span><span id="v-wind" class="hval">0.0 m/s</span></div>
      <div class="hrow" id="storm-warn" style="display:none"><span class="warn-txt">⚠ TEMPÊTE</span></div>
      <div class="hrow" id="best-row" style="display:none"><span class="hlbl">RECORD</span><span id="v-best" class="hval" style="color:#fc0">—</span></div>
    </div>
  </div>

  <!-- Barre de contrôles -->
  <div id="controls-bar" class="hidden">
    <span>↑ Propulseur</span>
    <span>←→ Rotation</span>
    <span>ESPACE Rétrofusée</span>
  </div>

  <!-- Bouton système solaire -->
  <button id="btn-solar" class="hidden" title="Système Solaire">🌌</button>

  <!-- Top Right: Diamonds & Shop -->
  <div id="solar-top-right" style="position:absolute; top:20px; right:20px; display:flex; flex-direction:column; align-items:flex-end; gap:24px; z-index:40;">
    <div id="diamond-counter" style="color:#0ff; font-family:'Orbitron', monospace; font-size:22px; text-shadow:0 0 10px rgba(0,255,255,0.7); display:flex; align-items:center; gap:8px; background:rgba(0,15,30,0.8); padding:6px 16px; border-radius:20px; border:1px solid #08f;">
      💎 <span id="diamond-count">0</span>
    </div>
    <button id="btn-shop" class="btn" style="background:linear-gradient(135deg,rgba(0,200,255,0.2),rgba(0,100,255,0.4)); border:1px solid #0cf; border-radius:6px; padding:10px 20px; font-weight:bold; cursor:pointer; color:#fff; font-family:'Orbitron', monospace;">🛒 HANGAR</button>
    <button id="btn-training">🏋 TRAINING</button>
  </div>

  <!-- Shop Card -->
  <div id="card-shop" class="card hidden" style="width:460px; max-height:85vh; overflow:hidden; display:flex; flex-direction:column; top:50%; left:50%; transform:translate(-50%, -50%); position:absolute; z-index:100; box-shadow:0 0 40px rgba(0,150,255,0.3);">
    <div class="card-title" style="color:#0cf; text-shadow:0 0 10px #0cf; text-align:center; font-size:26px; margin-bottom:5px; font-family:'Orbitron', monospace;">HANGAR SPATIAL</div>
    <div style="font-size:15px; margin-bottom:15px; color:#ddd; text-align:center; padding-bottom:12px; border-bottom:1px solid rgba(0,255,255,0.2);">
      Fonds disponibles: <b style="color:#0ff; font-size:18px;">💎 <span id="shop-solde">0</span></b>
    </div>
    <div id="shop-items" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:24px; padding-right:8px;"></div>
    <div class="card-actions" style="margin-top:20px; text-align:center;">
      <button id="btn-shop-close" class="btn-s" style="padding:10px 24px; font-size:16px;">FERMER</button>
    </div>
  </div>

  <!-- Carte planète -->
  <div id="card-planet" class="card hidden">
    <div id="card-emoji"></div>
    <h2 id="card-name"></h2>
    <div id="card-stars"></div>
    <div id="card-conditions"></div>
    <p id="card-desc"></p>
    <div class="card-btns">
      <button id="btn-launch" class="btn-p">🚀 Lancer la Mission</button>
      <button id="btn-back" class="btn-s">← Retour</button>
    </div>
  </div>

  <!-- Carte résultat -->
  <div id="card-result" class="card hidden">
    <h2 id="res-title"></h2>
    <div id="res-emoji"></div>
    <div id="res-stats"></div>
    <div id="res-stars"></div>
    <div class="card-btns">
      <button id="btn-retry" class="btn-p">🔄 Réessayer</button>
      <button id="btn-to-solar" class="btn-s">🌌 Système Solaire</button>
    </div>
  </div>

  <!-- Contrôles temps (vue solaire) -->
  <div id="time-ctrl">
    <span id="sim-date"></span>
    <button class="tbtn" data-speed="1" style="display:none">×1</button>
    <button class="tbtn" data-speed="1000" style="display:none">×1000</button>
    <button class="tbtn active" data-speed="100000" style="display:none">×100K</button>
    <button id="btn-reset"
      style="margin-left:15px; background:rgba(200,50,50,0.3); color:#f55; border:1px solid #f55; border-radius:4px; padding:2px 8px; cursor:pointer; font-family:'Share Tech Mono', monospace; font-size:12px;">RESET</button>
  </div>

  <!-- Tooltip non atterrissable -->
  <div id="tooltip" class="hidden"></div>

  <!-- Touch Controls (mobile + keyboard fallback visible during play) -->
  <div id="touch-controls" class="hidden">
    <div id="tc-rotate">
      <button id="tc-left" class="tc-btn">◄</button>
      <button id="tc-right" class="tc-btn">►</button>
    </div>
    <div id="tc-thrust-group">
      <button id="tc-thrust" class="tc-btn">▲</button>
      <button id="tc-retro" class="tc-btn">RETRO</button>
    </div>
  </div>

  <script src="astronomy.js"></script>
  <script src="lander.js"></script>
  <script src="main.js"></script>
</body>

</html>
